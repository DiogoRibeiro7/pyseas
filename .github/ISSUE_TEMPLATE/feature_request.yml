name: Feature request
description: Suggest a new plotting capability, API, or integration.
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What are you trying to do that pyseas doesn't support today?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed API or behavior
      description: What would you like the call site to look like? A code sketch is ideal.
      render: python

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Existing workarounds, other libraries, or different API shapes you've thought about.

  - type: textarea
    id: additional
    attributes:
      label: Anything else?
