name: CI

on:
  push:
    branches: [master]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: ruff check
        uses: astral-sh/ruff-action@v3
        with:
          args: "check"
      - name: ruff format --check
        uses: astral-sh/ruff-action@v3
        with:
          args: "format --check"

  type-check:
    name: Type check (mypy)
    runs-on: ubuntu-latest
    # TODO: drop continue-on-error once #24 adds mypy config + public-API types.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install mypy
        run: pip install mypy pandas-stubs
      - name: mypy
        run: mypy --ignore-missing-imports pyseas/

  test:
    name: Tests (py${{ matrix.python-version }} / ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.11", "3.12"]
    defaults:
      run:
        shell: bash -el {0}
    steps:
      - uses: actions/checkout@v4

      - name: Set up native deps via micromamba
        uses: mamba-org/setup-micromamba@v2
        with:
          environment-name: pyseas-ci
          create-args: >-
            python=${{ matrix.python-version }}
            cartopy>=0.24,<0.25
            gdal>=3.11,<4
            pytables>=3.10,<4
            h3>=4,<5
          cache-environment: true
          init-shell: bash

      - name: Install pyseas (editable) + test deps
        # Native deps (cartopy, gdal, pytables, h3) already provided by
        # micromamba above; pip resolves pure-python deps from pyproject.
        run: |
          pip install -e . pytest

      - name: Run tests
        run: pytest -v
